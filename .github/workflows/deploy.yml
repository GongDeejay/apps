name: Auto Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: garygrossgarten/github-action-ssh@v0.6.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          command: git config --global --add safe.directory /var/www/app.mplusm.site && cd /var/www/app.mplusm.site && bash deploy.sh
