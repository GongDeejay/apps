name: 自动部署到腾讯云服务器

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '.gitignore'

jobs:
  deploy:
    name: Deploy to app.mplusm.site
    runs-on: ubuntu-latest
    
    steps:
      - name: 触发服务器部署
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            bash /var/www/app.mplusm.site/deploy.sh

      - name: 验证部署结果
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            pm2 status mmsite
            curl -sI http://127.0.0.1:3456 | head -2
